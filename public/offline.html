<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2D69A9" />
    <title>Offline - Edmund Lungi's</title>
    <style>
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: #ffffff;
        color: #0b2236;
        display: grid;
        place-items: center;
      }
      .card {
        width: min(520px, calc(100% - 32px));
        border: 1px solid rgba(0,0,0,0.08);
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.06);
      }
      .title { font-size: 18px; font-weight: 700; margin: 0 0 8px; }
      .text { margin: 0; line-height: 1.5; opacity: 0.8; }
      .hint { margin-top: 12px; font-size: 13px; opacity: 0.7; }
    </style>
  </head>
  <body>
    <div class="card">
      <p class="title">You’re offline</p>
      <p class="text">Please check your internet connection and try again.</p>
      <p class="hint">Edmund Lungi’s will automatically reconnect when you’re back online.</p>
    </div>
  </body>
</html>
